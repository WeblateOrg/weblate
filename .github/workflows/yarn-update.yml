name: yarn update

on:
  push:
    branches:
    - renovate/**
    - dependabot/**
    - main
    - stable
    paths:
    - .github/workflows/yarn-update.yml
    - scripts/yarn-update
    - scripts/yarn/*
    - client/*
  schedule:
  - cron: 30 5 * * 0
  workflow_dispatch:
  pull_request:
    paths:
    - .github/workflows/yarn-update.yml
    - scripts/yarn-update
    - scripts/yarn/*
    - client/*

permissions:
  contents: read

jobs:
  yarn-update:
    if: startsWith(github.repository, 'WeblateOrg/')
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/pre-commit-setup
    - working-directory: ./client
      run: |
        yarn install --check-files
        yarn build
    - name: Lockfile maintenance
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      working-directory: ./client
      run: |
        yarn upgrade
        yarn install
        yarn build

    - name: Prepare maintenance patch (pre-commit-ci-lite)
      uses: ./.github/actions/auto-commit
      with:
        message: 'chore(js): update vendored libraries'
