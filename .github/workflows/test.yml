name: Test

on:
  push:
    branches-ignore:
    - renovate/**
    - weblate
    - dependabot/**
    - copilot/**
    - codex/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        python-version:
        - '3.12'
        - '3.13'
        - '3.14'
        requirements:
        - latest
        experimental:
        - false
        include:
        # Reduced testing for edge deps
        - python-version: '3.14'
          requirements: edge
          experimental: true
    name: py${{ matrix.python-version }}, ${{ matrix.requirements }} deps
    env:
      CI_REDIS_HOST: 127.0.0.1
      CI_REDIS_PORT: '6379'
      CI_DB_PASSWORD: weblate
      CI_DB_HOST: 127.0.0.1
      CI_DB_PORT: '5432'
      CI_SELENIUM: '1'
      DJANGO_SETTINGS_MODULE: weblate.settings_test
      PYTHONWARNINGS: default,ignore:unclosed:ResourceWarning
      PYTHONUNBUFFERED: 1
    services:
      database:
        image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: weblate
        ports:
        - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      cache:
        image: valkey/valkey:9.1.0-alpine@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02
        ports:
        - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: data-test/cache/tesseract
        key: tesseract-data
    - name: Set up Python ${{ matrix.python-version }}
      id: setup_python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        save-cache: ${{ github.ref == 'refs/heads/main' }}
        cache-suffix: ${{ steps.setup_python.outputs.python-version }}
        version: 0.11.29
    - name: Install apt dependencies
      run: sudo ./ci/apt-install
    - name: Install Python dependencies
      run: ./ci/pip-install ${{ matrix.requirements }}
    - name: Used versions
      run: |
        source .venv/bin/activate
        ./ci/print-versions
    - name: Prepare database
      run: ./ci/prepare-database
    - name: Compile MO files
      run: uv run coverage run ./manage.py compilemessages
    - name: Collect static files
      run: uv run coverage run ./manage.py collectstatic --noinput --verbosity 0
    - name: Migrate database
      run: uv run coverage run ./manage.py migrate --noinput --traceback
    - name: Django checks
      run: uv run coverage run ./manage.py check
    - name: Demo import
      run: |
        uv run coverage run ./manage.py import_demo
        # Second execution with --delete should remove and recreate
        uv run coverage run ./manage.py import_demo --delete
        uv run coverage run ./manage.py billing_demo
        # Second execution should gracefully handle existing project
        uv run coverage run ./manage.py billing_demo
    - name: Keep coverage
      run: |
        mkdir -p build/coverage
        mv .coverage.* build/coverage
    - name: Test with Django
      run: |
        source .venv/bin/activate
        uv run --all-extras pytest --junitxml=junit.xml --cov=weblate --numprocesses=auto weblate
        cp .coverage .coverage.pytest
    - name: Test wsgi startup
      env:
        PYTHONPATH: .
      run: uv run coverage run weblate/wsgi.py
    - name: Coverage
      run: |
        mv build/coverage/.coverage.* .
        uv run coverage combine
        uv run coverage xml
    - name: Upload Argos CI screenshots
      if: matrix.python-version == '3.14' && matrix.requirements == 'latest' && github.repository_owner == 'WeblateOrg'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-images
        path: test-images/
        if-no-files-found: error
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{secrets.CODECOV_TOKEN}} # zizmor: ignore[secrets-outside-env]
        flags: unittests
        name: Tests py${{ matrix.python-version }}, ${{ matrix.requirements }} deps
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
        report_type: test_results

  argos:
    runs-on: ubuntu-24.04
    name: Argos CI upload
    needs:
    - test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'WeblateOrg'
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    steps: &argos-upload-steps
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020   # v7.0.0
      with:
        node-version: 26
        package-manager-cache: false
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: test-images
        path: test-images
    - name: Install client dependencies for Argos CI
      working-directory: ./client
      run: yarn install --immutable
    - name: Argos CI upload
      working-directory: ./client
      run: yarn argos upload ../test-images/

  argos-pull-request:
    runs-on: ubuntu-24.04
    name: Argos CI pull request upload
    needs:
    - test
    if: github.event_name == 'pull_request' && github.repository_owner == 'WeblateOrg'
    permissions:
      contents: read
      pull-requests: read
    steps: *argos-upload-steps
