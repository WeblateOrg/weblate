name: uv lock update

on:
  push:
    branches:
    - renovate/**
    - dependabot/**
    - main
    - stable
    paths:
    - pyproject.toml
    - .github/workflows/uv-upgrade.yml
  schedule:
  - cron: 30 10 * * 0
  workflow_dispatch:
  pull_request:
    paths:
    - pyproject.toml
    - .github/workflows/uv-upgrade.yml

permissions:
  contents: read

jobs:
  uv-update:
    if: startsWith(github.repository, 'WeblateOrg/')
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/pre-commit-setup
    - name: Install apt dependencies
      run: sudo ./ci/apt-install

    - name: Lockfile maintenance
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: uv lock --upgrade

    - run: uv sync --all-extras
      name: Update lock file

    - name: Prepare maintenance patch (pre-commit-ci-lite)
      uses: ./.github/actions/auto-commit
      with:
        message: 'chore(deps): update lockfile'
