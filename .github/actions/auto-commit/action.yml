name: Prepare Auto Commit Changes
description: Prepares generated changes for trusted maintenance commits

runs:
  using: composite
  steps:
  - name: pre-commit format the code
    run: uv run --frozen --only-group pre-commit prek run --all-files
    continue-on-error: true
    shell: bash

  - name: Display changes
    run: git diff
    shell: bash

  - name: Prepare maintenance patch
    if: github.event_name != 'pull_request' && github.repository_owner == 'WeblateOrg'
    shell: bash
    run: |
      set -euo pipefail
      mkdir -p maintenance-patch
      git add -N .
      git diff HEAD --binary --src-prefix=a/ --dst-prefix=b/ > maintenance-patch/changes.patch
      git diff HEAD --name-only > maintenance-patch/files.txt
      {
        echo "workflow=${GITHUB_WORKFLOW}"
        echo "event=${GITHUB_EVENT_NAME}"
        echo "ref=${GITHUB_REF}"
        echo "ref_name=${GITHUB_REF_NAME}"
        echo "sha=${GITHUB_SHA}"
      } > maintenance-patch/metadata.env

  - name: Upload maintenance patch
    if: github.event_name != 'pull_request' && github.repository_owner == 'WeblateOrg'
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    with:
      name: maintenance-patch
      path: maintenance-patch
      retention-days: 3
