{% load static %}

{% if LANGUAGE_BIDI %}
  <link rel="stylesheet" href="{% static 'styles/vendor/bootstrap5_rtl.css' %}" />
{% else %}
  <link rel="stylesheet" href="{% static 'styles/vendor/bootstrap5.css' %}" />
{% endif %}
<link rel="stylesheet" href="{% static 'weblate_fonts/source-code-pro.css' %}" />
<link rel="stylesheet" href="{% static 'weblate_fonts/source-sans-3.css' %}" />
<link rel="stylesheet" href="{% static 'styles/vendor/tom-select.css' %}" />
<link rel="stylesheet" href="{% static 'styles/variables.css' %}" />
<link rel="stylesheet" href="{% static 'styles/main.css' %}" />
<link rel="stylesheet" href="{% static 'styles/date-range-picker.css' %}" />
{% if theme == "dark" %}
  <link rel="stylesheet" href="{% static 'style-dark.css' %}" />
{% elif theme != "light" %}
  {# auto, unset, or any other non-explicit value: gate on system preference #}
  <link rel="stylesheet"
        href="{% static 'style-dark.css' %}"
        media="(prefers-color-scheme: dark)" />
{% endif %}
{% if custom_css_hash %}
  <link rel="stylesheet" href="{% url "css-custom" %}?{{ custom_css_hash }}" />
{% endif %}
