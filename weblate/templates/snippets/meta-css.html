{% load compress static %}

{% compress css %}
  {% if LANGUAGE_BIDI %}
    <link rel="stylesheet"
          href="{% static 'styles/vendor/bootstrap5_rtl.css' %}{{ cache_param }}" />
  {% else %}
    <link rel="stylesheet"
          href="{% static 'styles/vendor/bootstrap5.css' %}{{ cache_param }}" />
  {% endif %}
  <link rel="stylesheet"
        href="{% static 'weblate_fonts/source-code-pro.css' %}{{ cache_param }}" />
  <link rel="stylesheet"
        href="{% static 'weblate_fonts/source-sans-3.css' %}{{ cache_param }}" />
  <link rel="stylesheet"
        href="{% static 'styles/vendor/tom-select.css' %}{{ cache_param }}" />
  <link rel="stylesheet" href="{% static 'styles/variables.css' %}{{ cache_param }}" />
  <link rel="stylesheet" href="{% static 'styles/main.css' %}{{ cache_param }}" />
  <link rel="stylesheet"
        href="{% static 'styles/date-range-picker.css' %}{{ cache_param }}" />
  {% if theme == "dark" %}
    <link rel="stylesheet" href="{% static 'style-dark.css' %}{{ cache_param }}" />
  {% elif theme != "light" %}
    {# auto, unset, or any other non-explicit value: gate on system preference #}
    <link rel="stylesheet"
          href="{% static 'style-dark.css' %}{{ cache_param }}"
          media="(prefers-color-scheme: dark)" />
  {% endif %}
{% endcompress %}
{% if custom_css_hash %}
  <link rel="stylesheet" href="{% url "css-custom" %}?{{ custom_css_hash }}" />
{% endif %}
