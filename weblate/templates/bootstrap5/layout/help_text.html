{% load icons %}

{% comment %}Based on crispy original, just adds help_as_icon logic.{% endcomment %}

{% if field.help_text %}
  {% if field.field.help_as_icon %}
    <span id="{{ field.auto_id }}_helptext"
          class="form-text"
          title="{{ field.help_text|safe }}">{% icon "info.svg" %}</span>
  {% elif help_text_inline %}
    <span id="{{ field.auto_id }}_helptext" class="form-text">{{ field.help_text|safe }}</span>
  {% else %}
    <div {% if field.auto_id %}id="{{ field.auto_id }}_helptext"{% endif %}
         class="form-text">{{ field.help_text|safe }}</div>
  {% endif %}
{% endif %}
