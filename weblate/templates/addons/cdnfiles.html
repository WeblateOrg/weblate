{% load i18n icons %}

<div class="form-group">
  <label>{% translate "Integration instructions" %}</label>

  <p>{% translate "Published translation files are available from the CDN base URL:" %}</p>
  <code>
    <button type="button"
            class="btn btn-link btn-xs float-end"
            data-clipboard-value="{{ url }}"
            title="{% translate "Copy to clipboard" %}">{% icon "copy.svg" %}</button>
    {{ url }}
  </code>

  <p>{% translate "Files use language-code names with the original file extension." %}</p>
</div>
