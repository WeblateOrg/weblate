    Addon:
      type: object
      properties:
        component:
          type: string
          format: uri
          readOnly: true
        project:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 100
        id:
          type: integer
          readOnly: true
        configuration: {}
        url:
          type: string
          format: uri
          readOnly: true
      required:
      - component
      - id
      - name
      - project
      - url
    AddonTriggerResponse:
      type: object
      properties:
        detail:
          type: string
        url:
          type: string
          format: uri
        logs_url:
          type: string
          format: uri
      required:
      - detail
      - logs_url
      - url
    Announcement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        message:
          type: string
          description: You can use Markdown and mention users by @username.
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          description: |-
            Severity defines color used for the message.

            * `info` - Info (light blue)
            * `warning` - Warning (yellow)
            * `danger` - Danger (red)
            * `success` - Success (green)
        expiry:
          type:
          - string
          - 'null'
          format: date
          title: Expiry date
          description: The message will be not shown after this date. Use it to announce
            string freeze and translation deadline for next release.
        notify:
          type: boolean
          title: Notify users
          description: Send notification to subscribed users.
      required:
      - id
      - message
    AutoComponentList:
      type: object
      properties:
        project_match:
          type: string
          title: Project regular expression
          description: Regular expression which is used to match project slug.
          maxLength: 200
        component_match:
          type: string
          title: Component regular expression
          description: Regular expression which is used to match component slug.
          maxLength: 200
    BilingualSourceUnit:
      type: object
      properties:
        state:
          $ref: '#/components/schemas/NewUnitStateEnum'
        context:
          type: string
        source:
          type: array
          items:
            type: string
        target:
          type: array
          items:
            type: string
      required:
      - source
