          type: string
        source:
          type: array
          items:
            type: string
        target:
          type: array
          items:
            type: string
      required:
      - source
      - target
    BlankEnum:
      enum:
      - ''
    BooleanResult:
      type: object
      properties:
        result:
          type: boolean
      required:
      - result
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Category name
          description: Display name
          maxLength: 100
        slug:
          type: string
          title: URL slug
          description: Name used in URLs and filenames.
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        project:
          type: string
          format: uri
        category:
          type: string
          format: uri
        url:
          type: string
          format: uri
          readOnly: true
        statistics_url:
          type: string
          format: uri
          readOnly: true
      required:
      - id
      - name
      - project
      - slug
      - statistics_url
      - url
    Change:
      type: object
      properties:
        unit:
          type: string
          format: uri
          readOnly: true
        component:
          type: string
          format: uri
          readOnly: true
        translation:
          type: string
          format: uri
          readOnly: true
        user:
