          items:
            $ref: '#/components/schemas/UnitFlatLabels'
      required:
      - labels
      - target
    UploadRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
        author_email:
          type: string
          format: email
        author_name:
          type: string
          maxLength: 200
        method:
          allOf:
          - $ref: '#/components/schemas/MethodEnum'
          default: translate
        fuzzy:
          default: ''
          oneOf:
          - $ref: '#/components/schemas/FuzzyEnum'
          - $ref: '#/components/schemas/BlankEnum'
        conflicts:
          default: ''
          oneOf:
          - $ref: '#/components/schemas/ConflictsEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - file
    UploadResult:
      type: object
      properties:
        result:
          type: boolean
        not_found:
          type: integer
        skipped:
          type: integer
        accepted:
          type: integer
        total:
          type: integer
        count:
          type: integer
      required:
      - accepted
      - count
      - not_found
      - result
      - skipped
      - total
    UserStatistics:
      type: object
      properties:
        translated:
          type: integer
        suggested:
          type: integer
        uploaded:
          type: integer
        commented:
          type: integer
        languages:
          type: integer
      required:
      - commented
      - languages
      - suggested
      - translated
      - uploaded
    VcsEnum:
      enum:
      - gerrit
      - git
      - git-force-push
      - local
      - mercurial
      - subversion
      type: string
      description: |-
        * `gerrit` - Gerrit
        * `git` - Git
        * `git-force-push` - Git with force push
        * `local` - No remote repository
        * `mercurial` - Mercurial
        * `subversion` - Subversion
    patch_200_Message_response_serializer:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    post_201_Message_response_serializer:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    put_200_Message_response_serializer:
      type: object
      properties:
        message:
          type: string
      required:
      - message
  securitySchemes:
    bearerAuth:
      type: apiKey
      in: header
      name: Bearer
      description: "Token-based authentication with required prefix `Bearer`.\n\n-
        Each user has a personal access token which they can get from their respective
        user profile. These tokens have the `wlu_` prefix.\n- It is possible to create
        project tokens whose access to the API is limited to operations to their associated
        project. These tokens have the `wlp_` prefix.\n        "
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: Session-based authentication used when user is signed in.
    tokenAuth:
      type: apiKey
      in: header
      name: Token
      description: "Token-based authentication with required prefix `Token`.\n\n-
        Each user has a personal access token which they can get from their respective
        user profile. These tokens have the `wlu_` prefix.\n- It is possible to create
        project tokens whose access to the API is limited to operations to their associated
        project. These tokens have the `wlp_` prefix.\n        "
